name: Hourly Analysis Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  step1-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch RSS feeds
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DEPLOY_URL/api/cron/rss" --max-time 55)
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]

  step2-analyze:
    needs: step1-rss
    runs-on: ubuntu-latest
    steps:
      - name: AI analysis
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DEPLOY_URL/api/cron/analyze" --max-time 55)
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]

  step3-summaries:
    needs: step2-analyze
    runs-on: ubuntu-latest
    steps:
      - name: Refresh ticker summaries
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DEPLOY_URL/api/cron/summaries" --max-time 55)
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]

  step4-parallel:
    needs: step3-summaries
    runs-on: ubuntu-latest
    steps:
      - name: Alerts + Briefing + Accuracy (parallel)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          call_endpoint() {
            local name=$1
            local path=$2
            HTTP_CODE=$(curl -s -o "/tmp/${name}.json" -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$DEPLOY_URL/api/cron/${path}" --max-time 55)
            echo "${name}: HTTP $HTTP_CODE"
            cat "/tmp/${name}.json" 2>/dev/null || true
            echo ""
          }

          call_endpoint "alerts" "alerts" &
          call_endpoint "briefing" "briefing" &
          call_endpoint "accuracy" "accuracy" &
          wait

          echo "All secondary tasks completed"
