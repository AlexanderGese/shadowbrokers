name: Hourly Analysis Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  phase1-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: RSS fetch + AI analysis
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DEPLOY_URL/api/cron/analyze" \
            --max-time 65)
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            exit 0
          fi
          exit 1

  phase2-alerts:
    needs: phase1-analyze
    runs-on: ubuntu-latest
    steps:
      - name: Check alerts + notifications
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DEPLOY_URL/api/cron/alerts" \
            --max-time 65)
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            exit 0
          fi
          exit 1

  phase2-briefing:
    needs: phase1-analyze
    runs-on: ubuntu-latest
    steps:
      - name: Generate market briefing
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DEPLOY_URL/api/cron/briefing" \
            --max-time 65)
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            exit 0
          fi
          exit 1

  phase2-accuracy:
    needs: phase1-analyze
    runs-on: ubuntu-latest
    steps:
      - name: Check prediction accuracy
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$DEPLOY_URL/api/cron/accuracy" \
            --max-time 65)
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            exit 0
          fi
          exit 1
